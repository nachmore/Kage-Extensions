name: build-catalog

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    validate:
        runs-on: ubuntu-latest
        steps:
            # `fetch-depth: 0` so we can compute changed-paths against
            # the merge-base of the PR (or the previous commit on push).
            # The check-* scripts use BASE_SHA / HEAD_SHA below to
            # decide which extensions to scan; without full history,
            # `git merge-base` falls back to "everything changed" and
            # the per-extension scoping is wasted.
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci

            # Schema check runs against EVERY manifest, every time —
            # cheap, and a malformed manifest in extension A can break
            # the catalog build for everyone, so we don't scope it to
            # changed items.
            - name: Validate manifests (every extension, every run)
              run: npm run validate

            # Per-extension checks scoped to changed items. The
            # affected-items helper picks up BASE_SHA / HEAD_SHA from
            # the env and walks `git diff --name-only base..head` to
            # decide what to scan. On a push to main this scopes to
            # whatever the merge introduced; on a PR it scopes to the
            # PR diff against the merge-base. Local runs without these
            # env vars fall back to "everything" (safe default).
            - name: Resolve diff range
              id: diff
              run: |
                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                    echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
                    echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
                  else
                    echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
                    echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Permissions hygiene
              env:
                  BASE_SHA: ${{ steps.diff.outputs.base }}
                  HEAD_SHA: ${{ steps.diff.outputs.head }}
              run: npm run check:permissions

            - name: Static security checks
              env:
                  BASE_SHA: ${{ steps.diff.outputs.base }}
                  HEAD_SHA: ${{ steps.diff.outputs.head }}
              run: npm run check:security

            - name: i18n hygiene
              env:
                  BASE_SHA: ${{ steps.diff.outputs.base }}
                  HEAD_SHA: ${{ steps.diff.outputs.head }}
              run: npm run check:i18n

            - name: Bundle hygiene
              env:
                  BASE_SHA: ${{ steps.diff.outputs.base }}
                  HEAD_SHA: ${{ steps.diff.outputs.head }}
              run: npm run check:bundle

            # Test-presence gate: every code-contributing extension must ship
            # tests (or carry a declared exemption). Runs against all
            # extensions — it's just file-existence + a manifest read.
            - name: Test presence
              run: npm run check:tests

            # Version-bump gate: an extension whose source changed but whose
            # manifest version didn't will never reach installed clients
            # (Kage only pulls a higher semver). Compares each extension's
            # source hash against the published catalog and fails on drift
            # without a bump. Fetches the live catalog; a fetch failure is a
            # soft skip (logged), so a Pages outage doesn't block merges.
            - name: Version-bump gate
              run: npm run check:versions

    test:
        # Functional unit tests for the extensions themselves. Fast (no
        # Worker / no host), so we run the whole suite every time rather
        # than scoping to changed extensions.
        #
        # Run under three timezones. Several extensions do date math
        # (calendar next-meeting, todos due dates): code that does local
        # arithmetic but formats/compares via toISOString() (UTC) only
        # diverges when the local date != the UTC date, and the direction
        # depends on the offset sign. UTC is the case where the bug HIDES
        # (local == UTC); the value is in the off-UTC zones, one on each
        # side — behind-UTC (America/Los_Angeles) shifts the date forward,
        # ahead-of-UTC (Asia/Tokyo) shifts it back. The date tests pin
        # their own clock (vi.setSystemTime) so they fail deterministically
        # regardless of when CI runs; this matrix is defense-in-depth that
        # also catches NEW date code written without a frozen clock.
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                tz: [UTC, America/Los_Angeles, Asia/Tokyo]
        env:
            TZ: ${{ matrix.tz }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - name: Run extension test suites (TZ=${{ matrix.tz }})
              run: npm test

    build:
        # Only build the catalog + deploy on push to main. PRs run validate-only.
        if: github.event_name != 'pull_request'
        needs: [validate, test]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - run: npm ci

            # Pull the previously deployed catalog + zips from the live
            # Pages URL so the build script can reuse unchanged zips
            # (saves CI minutes on rebuilds). Skipped on first-ever run
            # — the URL 404s and seed-dist.mjs degrades gracefully.
            - name: Seed dist/ from live Pages
              continue-on-error: true
              run: node scripts/seed-dist.mjs

            - run: npm run build

            # Drop the static store browser at the Pages root so visiting
            # the site shows a real page, not a 404.
            - name: Stage web browser
              run: |
                  cp web/index.html dist/index.html
                  cp web/style.css dist/style.css
                  cp web/app.js dist/app.js
                  cp web/spotify-callback.html dist/spotify-callback.html

            - uses: actions/upload-pages-artifact@v3
              with:
                  path: dist

    deploy:
        if: github.event_name != 'pull_request'
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - id: deployment
              uses: actions/deploy-pages@v4
