name: build-catalog

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    validate:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npm run validate

    build:
        # Only build the catalog + deploy on push to main. PRs run validate-only.
        if: github.event_name != 'pull_request'
        needs: validate
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - run: npm ci

            # Pull the previously deployed catalog + zips from the live
            # Pages URL so the build script can reuse unchanged zips
            # (saves CI minutes on rebuilds). Skipped on first-ever run
            # — the URL 404s and seed-dist.mjs degrades gracefully.
            - name: Seed dist/ from live Pages
              continue-on-error: true
              run: node scripts/seed-dist.mjs

            - run: npm run build

            # Drop the static store browser at the Pages root so visiting
            # the site shows a real page, not a 404.
            - name: Stage web browser
              run: |
                  cp web/index.html dist/index.html
                  cp web/style.css dist/style.css
                  cp web/app.js dist/app.js
                  cp web/spotify-callback.html dist/spotify-callback.html

            - uses: actions/upload-pages-artifact@v3
              with:
                  path: dist

    deploy:
        if: github.event_name != 'pull_request'
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - id: deployment
              uses: actions/deploy-pages@v4
